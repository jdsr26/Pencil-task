        positioning_gap: "Bare-bones functional product, no brand narrative or prestige positioning"
        note: "Commodity product vs premium K-beauty experience"
      - name: "Clinique Clarifying Lotion"
        positioning_gap: "Traditional toner format, no innovation story, dated positioning"
        note: "Classic brand but lacks modern skin science narrative"

# ─────────────────────────────────────────────
# Shared rules — apply to ALL products
# ─────────────────────────────────────────────
blocked_claims:
  - "Cures eczema"
  - "Cures acne"
  - "Medical-grade treatment"
  - "Dermatologist-prescribed"
  - "Clinically proven to reverse aging"
  - "FDA approved"
  - "Eliminates wrinkles"
  - "Replaces prescription skincare"

blocked_language:
  - "cure"
  - "treat"
  - "heal"
  - "prescription"
  - "miracle"
  - "magic"
  - "instant transformation"
  - "guaranteed results"
  - "anti-aging miracle"

rules:
  never_disparage_competitors: true
  never_make_medical_claims: true
  always_use_trademark_symbol: true
  require_source_for_statistics: true
